apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-frontend
  namespace: flux-system
spec:
  dependsOn:
    - name: apps-backend
  interval: 5m
  retryInterval: 1m
  timeout: 5m
  prune: true
  wait: true
  path: ./apps/frontend
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
